<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Inventory - Dev Front-End</title>
    <style>
        /* Estilização básica para o layout funcionar perfeitamente */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00b37e;
        }
        .filtros {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        button {
            background-color: #202024;
            color: #ffffff;
            border: 2px solid #00b37e;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00b37e;
            color: #121214;
        }
        #vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .game-card {
            background-color: #202024;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #323238;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .game-card h3 {
            margin-top: 0;
            color: #00b37e;
        }
        .categoria {
            display: inline-block;
            background-color: #29292e;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #c4c4cc;
        }
    </style>
</head>
<body>

    <h1>🎮 Meu Inventário de Jogos</h1>

    <!-- Fase 1: Botões de Filtro -->
    <div class="filtros">
        <button onclick="filtrarJogos('Todos')">Todos</button>
        <button onclick="filtrarJogos('RPG')">RPG</button>
        <button onclick="filtrarJogos('Ação')">Ação</button>
        <button onclick="filtrarJogos('Corrida')">Corrida</button>
    </div>

    <!-- Fase 1: Div container vazia que receberá os dados do JS -->
    <div id="vitrine"></div>

    <!-- Ligação com o arquivo JavaScript -->
    <script src="app.js"></script>
</body>
</html>
